---
############################################################
# 1. Get switch version info
############################################################
- name: Get switch version
  delegate_to: localhost
  ansible.builtin.shell: |
    /usr/bin/expect << 'EOF'
    set timeout 60

    spawn ssh -o StrictHostKeyChecking=no {{ ansible_user }}@{{ ansible_host }}

    expect "assword:"
    send "{{ ansible_password }}\r"

    expect ">"
    send "en\r"

    expect "#"
    send "show version\r"

    expect "#"

    send "exit\r"
    expect ">"
    send "exit\r"

    expect eof
    EOF
  args:
    executable: /bin/bash
  register: version_output

- name: Show version output
  debug:
    var: version_output.stdout

############################################################
# 2. Extract switch model (full line) and base model (M + 4 digits)
############################################################
- name: Extract switch model
  set_fact:
    switch_model: "{{ version_output.stdout | regex_search('Machine Model\\.\\.\\.\\.+\\s+(\\S+)', '\\1') | first }}"

- name: Extract switch base model from show version
  set_fact:
    switch_base_model: "{{ (version_output.stdout | regex_search('Machine Model\\.\\.\\.\\.+\\s+(M[0-9]{4})', '\\1') | default([''])) | first }}"

- name: Show detected switch model
  debug:
    var: switch_model

- name: Show detected switch base model
  debug:
    var: switch_base_model

############################################################
# 3. Extract base model from image filename (e.g. M4250 from M4250L-v13..., M4350 from M4350-v14...)
############################################################
- name: Extract base model from image filename
  set_fact:
    image_base_model: "{{ image_file | regex_search('M[0-9]{4}') | default('') }}"

- name: Show image base model
  debug:
    var: image_base_model

############################################################
# 4. Validate platform match
############################################################
- name: Fail if image does not match switch model
  fail:
    msg: >
      Image mismatch!
      Switch Model: {{ switch_model }} (base {{ switch_base_model }})
      Image Base Model: {{ image_base_model }}
  when: >
    (image_base_model | length == 0) or
    (switch_base_model | length == 0) or
    (image_base_model != switch_base_model)
