---
- name: Boot into given image and reload
  delegate_to: localhost
  ansible.builtin.shell: |
    /usr/bin/expect << 'EOF'
    set timeout 120

    spawn ssh -o StrictHostKeyChecking=no {{ ansible_user }}@{{ ansible_host }}

    expect "assword:"
    send "{{ ansible_password }}\r"

    expect ">"
    send "en\r"

    expect "#"
    send "boot system {{ boot_image }}\r"

    expect "#"
    send "write memory\r"

    expect "Are you sure you want to save? (y/n)"
    send "y\r"

    expect "#"
    send "reload\r"

    expect "Are you sure you want to reload the stack? (y/n)"
    send "y\r"

    sleep 5
    EOF
  args:
    executable: /bin/bash
