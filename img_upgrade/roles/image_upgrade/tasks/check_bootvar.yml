---
- name: Run show bootvar
  delegate_to: localhost
  ansible.builtin.shell: |
    /usr/bin/expect << 'EOF'
    set timeout 60

    spawn ssh -o StrictHostKeyChecking=no {{ ansible_user }}@{{ ansible_host }}

    expect "assword:"
    send "{{ ansible_password }}\r"

    expect ">"
    send "en\r"

    expect "#"
    send "show bootvar\r"

    expect "#"

    send "exit\r"
    expect ">"
    send "exit\r"

    expect eof
    EOF
  args:
    executable: /bin/bash
  register: bootvar_output


- name: Extract current active image
  set_fact:
    current_image: "{{ (bootvar_output.stdout | regex_search('\\n\\s*1\\s+\\S+\\s+\\S+\\s+(image[12])', '\\1')) | first }}"


- name: Debug current image
  debug:
    var: current_image


# NEW LOGIC

- name: Set test and revert images
  set_fact:
    boot_image_test: "{{ 'image2' if current_image == 'image1' else 'image1' }}"
    boot_image_revert: "{{ current_image }}"


- name: Debug image selection
  debug:
    msg:
      - "Current Image: {{ current_image }}"
      - "Test Image: {{ boot_image_test }}"
      - "Revert Image: {{ boot_image_revert }}"
