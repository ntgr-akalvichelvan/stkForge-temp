- name: Wait for Netgear switch to go down
  delegate_to: localhost
  wait_for:
    host: "{{ ansible_host }}"
    port: 22
    state: drained
    delay: 10
    timeout: 300
  when: not stack.enabled or is_stack_master

- name: Wait for Netgear switch to come back
  delegate_to: localhost
  wait_for:
    host: "{{ ansible_host }}"
    port: 22
    delay: 30
    timeout: "{{ reload_wait | default(600) }}"
  when: not stack.enabled or is_stack_master
