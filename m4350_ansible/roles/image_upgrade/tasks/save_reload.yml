- name: Save config and reload Netgear switch
  delegate_to: localhost
  ansible.builtin.shell: |
    /usr/bin/expect << 'EOF'
    set timeout 300

    spawn sshpass -p "{{ ansible_password }}" ssh -tt \
      -o StrictHostKeyChecking=no \
      -o UserKnownHostsFile=/dev/null \
      -o PreferredAuthentications=password \
      -o PubkeyAuthentication=no \
      {{ ansible_user }}@{{ ansible_host }}

    expect ">"
    send "enable\r"

    expect "#"
    send "boot system {{ boot_image}} \r"
 
    expect "#"
    send "write memory\r"

    # M4350: "Are you sure you want to save?"; M4250 may differ
    expect {
      "Are you sure you " {
        send "y\r"
      }
    }

    expect "#"
    send "reload\r"

    # M4350: "Are you sure you want to reload? (y/n)"; M4250: "Are you sure you would like to reset the system? (y/n)"
    expect {
      "Are you sure you " {
        send "y\r"
      }
    }

    # switch will drop SSH here
    expect eof
    EOF
  args:
    executable: /bin/bash
  register: reload_out
  changed_when: true
  when:
    - not stack.enabled or is_stack_master
