---
- name: Extract next-active image slot (as list)
  set_fact:
    _netgear_next_active_list: "{{ bootvar_out.stdout | regex_findall('^\\s*\\d+\\s+\\S+\\s+\\S+\\s+\\S+\\s+(image\\d+)', multiline=True) }}"

- name: Normalize next-active image slot to string
  set_fact:
    netgear_next_active: "{{ _netgear_next_active_list[0] | default('') }}"

- name: Debug parsed bootvar values
  debug:
    msg:
      - "Raw matches: {{ _netgear_next_active_list }}"
      - "Parsed next-active image: {{ netgear_next_active | default('EMPTY') }}"
